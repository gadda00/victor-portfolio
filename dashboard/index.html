<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Victor Ndunda | Control Center</title>
<meta name="description" content="Private dashboard for Victor Ndunda — analytics, content management, client briefs, job applications, and security center." />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
<meta name="theme-color" content="#0a0e1a" />
<meta name="color-scheme" content="dark light" />
<link rel="canonical" href="https://victorndunda.com/dashboard/" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<meta name="view-transition" content="same-origin" />
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/dashboard/dashboard.css" />

<!-- Security Headers -->
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://accounts.google.com https://www.arbeitnow.com https://remoteok.com https://remotive.io https://himalayas.app https://jobicy.com https://api.github.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" />
</head>
<body>

<!-- Skip link -->
<a href="#main" class="skip-link">Skip to content</a>

<!-- Login Overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-header">
      <svg width="48" height="48" viewBox="0 0 100 100" fill="none" aria-hidden="true">
        <defs><linearGradient id="authLogo" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#00d4ff"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#10b981"/>
        </linearGradient></defs>
        <circle cx="50" cy="50" r="14" fill="url(#authLogo)"/>
        <circle cx="20" cy="25" r="5" fill="url(#authLogo)"/><circle cx="80" cy="25" r="5" fill="url(#authLogo)"/>
        <circle cx="20" cy="75" r="5" fill="url(#authLogo)"/><circle cx="80" cy="75" r="5" fill="url(#authLogo)"/>
        <line x1="50" y1="50" x2="20" y2="25" stroke="url(#authLogo)" stroke-width="2" opacity="0.5"/>
        <line x1="50" y1="50" x2="80" y2="25" stroke="url(#authLogo)" stroke-width="2" opacity="0.5"/>
        <line x1="50" y1="50" x2="20" y2="75" stroke="url(#authLogo)" stroke-width="2" opacity="0.5"/>
        <line x1="50" y1="50" x2="80" y2="75" stroke="url(#authLogo)" stroke-width="2" opacity="0.5"/>
      </svg>
      <h1>Dashboard Access</h1>
      <p>Sign in to manage your portfolio, clients, and applications.</p>
    </div>
    <div id="googleSignInBtn" class="google-btn-container"></div>
    <div class="auth-divider"><span>or</span></div>
    <form id="passwordLoginForm" class="auth-form">
      <input type="text" id="usernameInput" placeholder="Username" autocomplete="username" required />
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" class="btn btn-primary btn-block">Sign in with password</button>
    </form>
    <div id="authError" class="auth-error" style="display:none"></div>
    <p class="auth-note">Authorized access only. All login attempts are logged.</p>
    <a href="/" class="auth-back">← Back to site</a>
  </div>
</div>

<!-- Main Dashboard (hidden until auth) -->
<div id="dashApp" style="display:none">
  <!-- Top Nav -->
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <a href="/" class="dash-logo">
        <svg width="28" height="28" viewBox="0 0 100 100" fill="none" aria-hidden="true">
          <defs><linearGradient id="dashLogo" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#00d4ff"/><stop offset="1" stop-color="#a855f7"/>
          </linearGradient></defs>
          <circle cx="50" cy="50" r="14" fill="url(#dashLogo)"/>
          <circle cx="20" cy="25" r="5" fill="url(#dashLogo)"/><circle cx="80" cy="25" r="5" fill="url(#dashLogo)"/>
          <circle cx="20" cy="75" r="5" fill="url(#dashLogo)"/><circle cx="80" cy="75" r="5" fill="url(#dashLogo)"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <div class="dash-nav-right">
        <div class="dash-user" id="dashUserInfo">
          <img id="userAvatar" alt="" />
          <span id="userName">User</span>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </nav>

  <main id="main" class="dash-main">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dashSidebar">
      <nav class="dash-side-nav">
        <button class="dash-side-link active" data-section="overview"><span>📊</span> Overview</button>
        <button class="dash-side-link" data-section="content"><span>📝</span> Content</button>
        <button class="dash-side-link" data-section="clients"><span>💼</span> Client Briefs</button>
        <button class="dash-side-link" data-section="analytics"><span>📈</span> Analytics</button>
        <button class="dash-side-link" data-section="jobs"><span>🔍</span> Jobs</button>
        <button class="dash-side-link" data-section="social"><span>💬</span> Social Composer</button>
        <button class="dash-side-link" data-section="seo"><span>🔎</span> SEO</button>
        <button class="dash-side-link" data-section="security"><span>🔒</span> Security</button>
        <button class="dash-side-link" data-section="settings"><span>⚙️</span> Settings</button>
      </nav>
    </aside>

    <!-- Content area -->
    <div class="dash-content" id="dashContent">
      <!-- Sections rendered dynamically by dashboard.js -->
    </div>
  </main>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="/auth.js" defer></script>
<script src="/dashboard/dashboard.js" defer></script>
</body>
</html>
