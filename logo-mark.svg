<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
  </defs>
  <!-- Connection lines -->
  <g stroke="url(#markGrad)" stroke-width="2" opacity="0.4">
    <line x1="50" y1="50" x2="20" y2="25"/>
    <line x1="50" y1="50" x2="80" y2="25"/>
    <line x1="50" y1="50" x2="20" y2="75"/>
    <line x1="50" y1="50" x2="80" y2="75"/>
  </g>
  <!-- Satellite nodes -->
  <g fill="url(#markGrad)" filter="url(#glow)">
    <circle cx="20" cy="25" r="5"/>
    <circle cx="80" cy="25" r="5"/>
    <circle cx="20" cy="75" r="5"/>
    <circle cx="80" cy="75" r="5"/>
  </g>
  <!-- Center node -->
  <circle cx="50" cy="50" r="14" fill="url(#markGrad)" filter="url(#glow)"/>
</svg>