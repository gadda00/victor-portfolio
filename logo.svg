<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Mark (40x40 at position 20,20) -->
  <g transform="translate(20, 20) scale(0.4)">
    <g stroke="url(#markGrad)" stroke-width="2" opacity="0.4">
      <line x1="50" y1="50" x2="20" y2="25"/>
      <line x1="50" y1="50" x2="80" y2="25"/>
      <line x1="50" y1="50" x2="20" y2="75"/>
      <line x1="50" y1="50" x2="80" y2="75"/>
    </g>
    <g fill="url(#markGrad)" filter="url(#glow)">
      <circle cx="20" cy="25" r="5"/>
      <circle cx="80" cy="25" r="5"/>
      <circle cx="20" cy="75" r="5"/>
      <circle cx="80" cy="75" r="5"/>
      <circle cx="50" cy="50" r="14"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="80" y="50" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="url(#textGrad)">Victor Ndunda</text>
</svg>